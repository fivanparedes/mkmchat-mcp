services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  python-api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env.docker
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      MKM_HTTP_HOST: ${MKM_HTTP_HOST:-0.0.0.0}
    ports:
      - "8080:8080"
    depends_on:
      - ollama

  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    env_file:
      - ./webapp/.env.docker
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: ${DB_CONNECTION:-sqlite}
      MKM_API_URL: ${MKM_API_URL:-http://python-api:8080}
      MKM_DAILY_LIMIT: ${MKM_DAILY_LIMIT:-0}
      APP_KEY: ${APP_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      - python-api
    volumes:
      - webapp_storage:/var/www/html/storage
      - webapp_database:/var/www/html/database

volumes:
  ollama_data:
  webapp_storage:
  webapp_database:
