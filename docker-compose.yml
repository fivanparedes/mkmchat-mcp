services:
  ollama:
    build:
      context: .
      dockerfile: docker/ollama/Dockerfile
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-15m}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-1}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
      OLLAMA_MAX_QUEUE: ${OLLAMA_MAX_QUEUE:-512}
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-4096}
      OLLAMA_FLASH_ATTENTION: ${OLLAMA_FLASH_ATTENTION:-false}
      OLLAMA_LOAD_TIMEOUT: ${OLLAMA_LOAD_TIMEOUT:-10m}
      OLLAMA_GPU_OVERHEAD: ${OLLAMA_GPU_OVERHEAD:-0}
      OLLAMA_SCHED_SPREAD: ${OLLAMA_SCHED_SPREAD:-false}
      OLLAMA_HOST: ${OLLAMA_HOST:-0.0.0.0:11434}
      OLLAMA_MODELS: ${OLLAMA_MODELS:-/root/.ollama/models}
      OLLAMA_KV_CACHE_TYPE: ${OLLAMA_KV_CACHE_TYPE:-}
      OLLAMA_LLM_LIBRARY: ${OLLAMA_LLM_LIBRARY:-}
      OLLAMA_VULKAN: ${OLLAMA_VULKAN:-false}
      OLLAMA_MULTIUSER_CACHE: ${OLLAMA_MULTIUSER_CACHE:-false}
      OLLAMA_NOHISTORY: ${OLLAMA_NOHISTORY:-false}
      OLLAMA_NOPRUNE: ${OLLAMA_NOPRUNE:-false}
      OLLAMA_NO_CLOUD: ${OLLAMA_NO_CLOUD:-false}
      OLLAMA_NEW_ENGINE: ${OLLAMA_NEW_ENGINE:-false}
      OLLAMA_DEBUG: ${OLLAMA_DEBUG:-INFO}
      OLLAMA_ORIGINS: ${OLLAMA_ORIGINS:-}
      OLLAMA_REMOTES: ${OLLAMA_REMOTES:-ollama.com}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-}
      GPU_DEVICE_ORDINAL: ${GPU_DEVICE_ORDINAL:-}
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  python-api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env.docker
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      MKM_HTTP_HOST: ${MKM_HTTP_HOST:-0.0.0.0}
      MKM_DEBUG_PROMPTS: "true"
      MKM_HTTP_TIMEOUT_SECONDS: "600"
    ports:
      - "8080:8080"
    depends_on:
      - ollama

  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    env_file:
      - ./webapp/.env.docker
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: ${DB_CONNECTION:-sqlite}
      MKM_API_URL: http://python-api:8080
      MKM_DAILY_LIMIT: ${MKM_DAILY_LIMIT:-0}
      MKM_WEB_RATE_LIMIT_PER_MINUTE: ${MKM_WEB_RATE_LIMIT_PER_MINUTE:-10}
      MKM_HTTP_TIMEOUT_SECONDS: ${MKM_HTTP_TIMEOUT_SECONDS:-3600}
    ports:
      - "8000:8000"
    depends_on:
      - python-api
    volumes:
      - webapp_storage:/var/www/html/storage
      - webapp_database:/var/www/html/database

volumes:
  ollama_data:
  webapp_storage:
  webapp_database:
